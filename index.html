<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTJ - Pursue The Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body {background:#0a0a0a;color:#f1c40f;overflow-x:hidden;scroll-behavior:smooth;}

nav {position:fixed;width:100%;padding:20px;display:flex;justify-content:center;background:rgba(0,0,0,0.8);}
nav button {background:none;border:none;color:#f1c40f;margin:0 10px;font-size:1rem;cursor:pointer;}

header {height:100vh;background:url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1') center/cover no-repeat;display:flex;justify-content:center;align-items:center;text-align:center;}
.hero h1 {font-size:4rem;}
.hero p {color:#ddd;}

.btn {margin-top:20px;padding:10px 25px;background:#f1c40f;color:black;border:none;border-radius:20px;cursor:pointer;}

section {display:none;padding:40px;text-align:center;}
section.active {display:block;}

h2 {font-size:1.8rem;text-decoration:underline;margin-bottom:20px;}

.cta {background:linear-gradient(135deg,#f1c40f,#d4ac0d);color:black;padding:30px;border-radius:20px;}
.cta h2,.cta p {color:black;}

.card {background:#111;padding:20px;margin:10px;display:inline-block;border-radius:10px;}
footer {text-align:center;padding:20px;}
</style>

<script>
function showSection(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</head>
<body>

<!-- NAV -->
<nav>
  <button onclick="showSection('about')">About</button>
  <button onclick="showSection('services')">Services</button>
  <button onclick="showSection('join')">Join</button>
  <button onclick="showSection('contact')">Contact</button>
</nav>

<!-- HOME -->
<header>
  <div class="hero">
    <h1>PTJ</h1>
    <p>Pursue The Journey</p>
    <button class="btn" onclick="showSection('about')">Start</button>
  </div>
</header>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <p>PTJ is about discipline, growth, and pushing your limits.</p>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Services</h2>
  <div class="card">💪 Personal Training</div>
  <div class="card">🏃 Conditioning</div>
  <div class="card">🧠 Mindset</div>
</section>

<!-- JOIN (WITH MUSIC) -->
<section id="join">
  <div class="cta">
    <h2>Your Journey Starts Now</h2>
    <p>Are you ready to pursue it?</p>

    <button class="btn" onclick="showSection('contact')">Join PTJ</button>

    <br><br>

    <!-- MUSIC BUTTONS -->
    <button class="btn" onclick="playMusic()">▶ Play Music</button>
    <button class="btn" onclick="pauseMusic()">⏸ Pause</button>

    <!-- AUDIO FILE -->
    <audio id="music">
      <source src="daft-punk-around-the-world.mp3" type="audio/mpeg">
    </audio>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Email: PTJfitness@business.com</p>
  <p>Phone: 08001234567</p>
</section>

<footer>
  <p>PTJ – Pursue The Journey</p>
</footer>

<script>
function playMusic(){
  document.getElementById("music").play();
}
function pauseMusic(){
  document.getElementById("music").pause();
}
</script>

</body>
</html>
